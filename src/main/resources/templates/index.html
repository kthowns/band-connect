<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/styles-index.css}">
</head>
<body>
<header th:replace="~{fragments/navBar :: navBar}"></header>

<main>
    <section id="search" class="section">
        <h2>🎸 우리 밴드에 꼭 맞는 멤버 찾기</h2>
        <div class="tag-search">
            <form th:action="@{/}" method="get">
                <input type="text" name="keyword" th:value="${param.keyword}" placeholder="장르나 악기를 입력하세요 (예: #밴드 #기타)"
                       required>
                <button type="submit" class="tag-search-btn">검색</button>
            </form>
        </div>

        <div class="card-container">
            <div class="content-header">
                <h3>최신 구인 소식</h3>
                <button sec:authorize="isAuthenticated()"
                        class="comment-inline-submit-btn"
                        th:onclick="|location.href='@{/posts/write}'|">글 작성
                </button>
            </div>

            <div th:if="${#lists.isEmpty(posts)}" class="no-posts">
                <p>등록된 구인글이 없습니다. 첫 소식을 올려보세요!</p>
            </div>

            <div th:unless="${#lists.isEmpty(posts)}"
                 th:each="post : ${posts}"
                 class="card clickable"
                 th:onclick="|location.href='@{/posts/{id}(id=${post.id})}'|">

                <div class="card-title-row">
                    <h3 th:text="${post.title}">제목</h3>
                    <span class="hashtag">
                        <th:block th:if="${post.hashtags != null}">
                            <span th:each="tag : ${post.hashtags}" th:text="|${tag.name} |"></span>
                        </th:block>
                    </span>
                </div>
                <p><strong>밴드명 :</strong> [[${post.band?.name ?: '이름 없음'}]]</p>

                <p>
                    <strong>모집 파트:</strong>
                    <th:block th:if="${post.recruits != null}">
                        <th:block th:each="recruit : ${post.recruits}" th:if="${recruit.member == null}">
                            <span class="recruit-badge" th:text="${recruit.position}">기타</span>
                            <th:block th:text="' '"></th:block>
                        </th:block>
                    </th:block>

                    <th:block th:if="${not #lists.isEmpty(post.recruits)}">
                        <span class="status-tag complete" th:if="${post.closed}">모집 마감</span>
                    </th:block>
                </p>
                <div class="card-footer">

                    <span class="comment-count">
                    댓글 [[${#lists.size(post.comments)}]] · 조회수 [[${post.views}]]
                    </span>

                    <span class="date" th:if="${post.createdAt != null}"
                          th:text="'작성일: ' + ${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
            </div>
        </div>
        <div th:if="${!posts.isEmpty()}" class="pagination-container">
            <ul class="pagination">
                <li th:classappend="${posts.first} ? 'disabled'">
                    <a th:href="@{/(page=${posts.number - 1}, keyword=${keyword})}"
                       th:if="${!posts.first}">이전</a>
                </li>

                <th:block th:with="
            start=${(posts.number / 10) * 10 + 1},
            total=${posts.totalPages},
            last=${(start + 9 < total ? start + 9 : (total == 0 ? 1 : total))}">

                    <li th:each="page : ${#numbers.sequence(start, last)}"
                        th:classappend="${page == posts.number + 1} ? 'active'">
                        <a th:href="@{/(page=${page - 1}, keyword=${keyword})}"
                           th:text="${page}">1</a>
                    </li>
                </th:block>

                <li th:classappend="${posts.last} ? 'disabled'">
                    <a th:href="@{/(page=${posts.number + 1}, keyword=${keyword})}"
                       th:if="${!posts.last}">다음</a>
                </li>
            </ul>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
