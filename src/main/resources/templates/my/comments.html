<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect - 내가 쓴 댓글</title>
</head>
<body class="bg-bg-main">
<header th:replace="~{fragments/navBar :: navBar}"></header>

<main class="max-w-[800px] mx-auto my-16 px-6" th:if="${comments != null}">
    <section>
        <h2 class="text-[1.75rem] font-black text-primary mb-12 border-l-8 border-accent pl-6 tracking-tighter text-center sm:text-left">내가 쓴 댓글</h2>

        <!-- [Empty State] -->
        <div th:if="${#lists.isEmpty(comments)}" class="bg-white p-24 rounded-custom text-center border-2 border-dashed border-border text-slate-400">
            <p class="text-xl">작성한 댓글이 아직 없습니다.</p>
        </div>

        <!-- 댓글 리스트 -->
        <div th:unless="${#lists.isEmpty(comments)}" class="space-y-6">
            <article th:each="comment : ${comments}"
                     class="group bg-white border border-border rounded-custom p-8 shadow-custom hover:shadow-custom-hover hover:border-accent hover:-translate-x-1.5 transition-all duration-300 cursor-pointer"
                     th:onclick="|location.href='@{/posts/{id}(id=${comment.postId})}'|">
                
                <div class="mb-4 flex items-center gap-3">
                    <span class="bg-slate-100 text-slate-500 px-2.5 py-1 rounded text-[0.75rem] font-black">POST</span>
                    <h3 class="text-[1.15rem] font-black text-primary group-hover:text-accent transition-colors tracking-tight truncate" th:text="${comment.postTitle}">게시글 제목</h3>
                </div>

                <div class="mb-6">
                    <p class="text-[1.05rem] text-primary leading-relaxed font-medium" th:text="${comment.content}">댓글 내용</p>
                </div>

                <div class="pt-4 border-t border-slate-50 flex justify-between items-center">
                    <span class="text-[0.85rem] text-slate-400 font-bold"
                          th:text="|📅 ${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}|">작성 날짜</span>
                    <span class="text-accent text-[0.85rem] font-black opacity-0 group-hover:opacity-100 transition-opacity">원본 글 보기 →</span>
                </div>
            </article>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
