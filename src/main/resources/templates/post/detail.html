<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${postDetail.title}">BandConnect - 게시글 상세</title>
</head>
<body class="bg-bg-main">
    <header th:replace="~{fragments/navBar :: navBar}"></header>

    <main class="max-w-[850px] mx-auto my-16 px-6">
        <!-- 게시글 상세 카드 -->
        <article class="bg-white border border-border rounded-custom p-10 shadow-custom mb-12">
            <div class="flex justify-between items-start mb-8 pb-6 border-b border-slate-50">
                <div>
                    <h1 class="text-[2.5rem] font-black text-primary tracking-tight leading-tight mb-4" th:text="${postDetail.title}">게시글 제목</h1>
                    <div class="flex gap-4 text-[0.95rem] text-slate-400 font-bold items-center">
                        <span th:text="|📅 ${#temporals.format(postDetail.createdAt, 'yyyy-MM-dd HH:mm')}|">작성일</span>
                        <span th:text="|👀 조회수: ${postDetail.views}|">조회수</span>
                        <span class="text-accent" th:text="|👥 지원자: ${postDetail.applicantsCount}|">지원자 수</span>
                    </div>
                </div>
                
                <form th:if="${user != null and postDetail.author.id == user.id}"
                      th:action="@{/posts/{id}/delete(id=${postDetail.id})}" method="post">
                    <input type="hidden" name="cls" value="Post">
                    <input type="hidden" name="postId" th:value="${postDetail.id}">
                    <button type="submit" class="bg-white text-accent border-2 border-accent px-5 py-2 rounded-custom font-bold hover:bg-accent hover:text-white transition-all" 
                            onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                </form>
            </div>

            <div class="mb-10">
                <p class="text-[1.1rem] font-black text-primary mb-6 flex items-center gap-2">
                    <span class="bg-primary text-white px-3 py-1 rounded text-sm">BAND</span> 
                    <span th:text="${postDetail.band.name}">밴드명</span>
                </p>
                <div class="text-[1.15rem] leading-[1.8] text-primary whitespace-pre-wrap mb-10" th:text="${postDetail.content}">본문 내용</div>
                
                <div class="flex flex-wrap gap-2 mb-10">
                    <span th:each="tag : ${postDetail.hashtags}" class="text-accent font-extrabold text-[0.95rem] bg-accent/5 px-3 py-1.5 rounded" th:text="|#${tag.name}|">#태그</span>
                </div>

                <!-- 모집 현황 -->
                <div class="bg-slate-50 p-6 rounded-custom border border-border">
                    <h3 class="text-[1.1rem] font-black text-primary mb-4 flex items-center gap-2">📢 모집 파트 현황</h3>
                    <ul class="flex flex-wrap gap-3">
                        <li th:each="recruit : ${postDetail.recruits}" 
                            class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-custom border border-border shadow-sm">
                            <span class="font-bold text-primary" th:text="${recruit.position}">기타</span>
                            <span th:classappend="${recruit.member != null} ? 'bg-slate-800 text-white' : 'bg-accent text-white'"
                                  class="text-[0.75rem] font-black px-2 py-0.5 rounded uppercase"
                                  th:text="${recruit.member != null ? '마감' : '모집 중'}">모집 중</span>
                        </li>
                    </ul>
                </div>
            </div>

            <button class="w-full bg-accent text-white py-5 rounded-custom text-xl font-black hover:bg-accent-hover hover:-translate-y-1 shadow-lg transition-all" 
                    onclick="openModal()">지원하기</button>
        </article>

        <!-- 댓글 섹션 -->
        <section class="bg-white border border-border rounded-custom p-10 shadow-custom">
            <h2 class="text-2xl font-black text-primary mb-8 tracking-tight text-center">댓글</h2>

            <form sec:authorize="isAuthenticated()" th:action="@{/posts/{id}/comment/write(id=${postDetail.id})}" method="post" class="flex gap-3 mb-12 max-w-[700px] mx-auto">
                <input type="text" name="content" placeholder="댓글을 입력하세요" required
                       class="flex-1 px-5 py-3.5 border-[1.5px] border-border rounded-custom text-[1rem] outline-none bg-white focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                <button type="submit" class="bg-primary text-white px-8 py-3.5 rounded-custom font-bold hover:bg-accent transition-all">게시</button>
            </form>

            <div class="space-y-6 max-w-[700px] mx-auto">
                <div th:each="comment : ${postDetail.comments}" class="group pb-6 border-b border-slate-50 last:border-none">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-3">
                            <strong class="text-primary font-bold" th:text="${comment.author.username}">유저명</strong>
                            <span class="text-[0.85rem] text-slate-400 font-medium" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                        </div>
                        <form th:if="${user != null and comment.author.id == user.id}" th:action="@{/comments/{id}/delete(id=${comment.id})}" method="post">
                            <input type="hidden" name="cls" value="Comment">
                            <input type="hidden" name="postId" th:value="${postDetail.id}">
                            <input type="hidden" name="commentId" th:value="${comment.id}">
                            <input type="hidden" name="returnUri" th:value="${currentUri}">
                            <button type="submit" class="text-slate-300 hover:text-accent font-bold text-[0.85rem] transition-colors">삭제</button>
                        </form>
                    </div>
                    <p class="text-primary leading-relaxed" th:text="${comment.content}">댓글 내용</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 지원 모달 -->
    <div id="applyModal" class="fixed inset-0 z-[2000] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-[520px] p-12 rounded-custom shadow-2xl relative animate-modal-slide">
            <span class="absolute top-6 right-6 text-3xl text-slate-400 cursor-pointer hover:text-accent transition-transform hover:rotate-90" onclick="closeModal()">&times;</span>
            <h2 class="text-2xl font-black text-primary mb-10 text-center tracking-tight">지원 폼</h2>
            
            <form id="application-form" th:action="@{/recruits/apply}" method="post" class="space-y-5">
                <div>
                    <label class="block text-[0.9rem] font-bold text-primary mb-2">이름</label>
                    <input type="text" name="name" placeholder="이름을 입력하세요" required
                           class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[0.9rem] font-bold text-primary mb-2">나이</label>
                        <input type="number" name="age" required
                               class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                    </div>
                    <div>
                        <label class="block text-[0.9rem] font-bold text-primary mb-2">지역</label>
                        <input type="text" name="location" required
                               class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-[0.9rem] font-bold text-primary mb-2">지원 파트</label>
                    <select name="recruitId" required
                            class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all bg-white">
                        <option th:each="recruit : ${postDetail.recruits}" th:if="${recruit.member == null}" th:value="${recruit.id}" th:text="${recruit.position}">파트명</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[0.9rem] font-bold text-primary mb-2">전화번호</label>
                    <input type="tel" name="phone" placeholder="010-0000-0000" required
                           class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                </div>
                <div>
                    <label class="block text-[0.9rem] font-bold text-primary mb-2">자기소개</label>
                    <textarea name="description" rows="4" placeholder="본인의 장점이나 활동 경력을 간단히 입력하세요" required
                              class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all resize-none"></textarea>
                </div>
                <input type="hidden" name="returnUri" th:value="${currentUri}">
                <button type="submit" class="w-full bg-accent text-white py-4 mt-4 rounded-custom text-lg font-black hover:bg-accent-hover hover:-translate-y-1 shadow-lg transition-all">제출하기</button>
            </form>
        </div>
    </div>

    <style>
        @keyframes modal-slide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-modal-slide { animation: modal-slide 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:inline="javascript">
        function openModal() {
            const isAuthenticated = [[${user != null}]];
            if (isAuthenticated) {
                const modal = document.getElementById('applyModal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                alert("로그인 후 이용해주세요.");
                location.href = [[@{/login}]];
            }
        }
        function closeModal() {
            const modal = document.getElementById('applyModal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
