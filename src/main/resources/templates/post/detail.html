<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${postDetail.title}">BandConnect - 게시글 상세</title>
</head>
<body class="bg-bg-main">
    <header th:replace="~{fragments/navBar :: navBar}"></header>

    <main class="max-w-[850px] mx-auto my-12 px-6">
        <!-- 게시글 본체 -->
        <article class="bg-white border border-border rounded-custom p-8 shadow-custom mb-8">
            <!-- 1. 제목 및 메타 -->
            <div class="flex justify-between items-start mb-6 pb-5 border-b border-slate-50">
                <div>
                    <h1 class="text-[2rem] font-black text-primary tracking-tight leading-tight mb-3" th:text="${postDetail.title}">게시글 제목</h1>
                    <p th:text="${postDetail.author.name}">작성자</p>
                    <div class="flex flex-wrap gap-4 text-[0.85rem] text-slate-400 font-bold items-center">
                        <span th:text="|📅 ${#temporals.format(postDetail.createdAt, 'yyyy-MM-dd HH:mm')}|">작성일</span>
                        <span th:text="|👀 조회수 ${postDetail.views}|">조회수</span>
                        <span class="text-accent" th:text="|👥 지원자 ${postDetail.applicantsCount}명|">지원자 수</span>
                    </div>
                </div>
                
                <!-- 수정 및 삭제 버튼 -->
                <div th:if="${user != null and postDetail.author.id == user.id}" class="flex gap-2">
                    <a th:href="@{/posts/{id}/edit(id=${postDetail.id})}"
                       class="bg-white text-slate-300 border border-slate-200 px-3 py-1 rounded-custom font-bold hover:text-primary hover:border-primary transition-all text-xs">
                        수정
                    </a>
                    <form th:action="@{/posts/{id}/delete(id=${postDetail.id})}" method="post">
                        <input type="hidden" name="cls" value="Post">
                        <input type="hidden" name="postId" th:value="${postDetail.id}">
                        <button type="submit" class="bg-white text-slate-300 border border-slate-200 px-3 py-1 rounded-custom font-bold hover:text-accent hover:border-accent transition-all text-xs"
                                onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                    </form>
                </div>
            </div>

            <!-- 2. 밴드 정보 및 본문 -->
            <div class="mb-8">
                <p class="text-[0.95rem] font-black text-primary mb-6 flex items-center gap-2">
                    <strong class="text-slate-400 font-bold mr-1">밴드명</strong> 
                    <span th:text="${postDetail.band.name}">밴드명</span>
                </p>
                <div class="text-[1.05rem] leading-[1.7] text-primary whitespace-pre-wrap" th:text="${postDetail.content}">게시글 본문 내용</div>
            </div>

            <!-- 3. 해시태그 -->
            <div class="flex flex-wrap gap-2 mb-8">
                <span th:each="tag : ${postDetail.hashtags}" class="text-accent font-extrabold text-[0.85rem] bg-accent/5 px-2.5 py-1.5 rounded border border-accent/10" th:text="|${tag.name}|">#태그</span>
            </div>

            <!-- 4. 모집 현황 현황판 -->
            <div class="bg-slate-50 p-6 rounded-custom border border-border mb-8">
                <h3 class="text-[0.9rem] font-black text-primary mb-4 flex items-center gap-2">📢 모집 파트 현황</h3>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                    <div th:each="recruit : ${postDetail.recruits}" 
                         th:classappend="${recruit.member != null} ? 'bg-slate-100 border-slate-200 opacity-60' : 'bg-white border-border shadow-sm hover:border-accent'"
                         class="flex flex-col items-center justify-center py-4 px-2 rounded border transition-all text-center">
                        <span class="font-black text-primary text-[0.95rem] mb-1.5 tracking-tighter" th:text="${recruit.position}">기타</span>
                        <div class="flex items-center gap-1.5">
                            <span th:classappend="${recruit.member != null} ? 'bg-slate-400' : 'bg-accent'"
                                  class="w-1.5 h-1.5 rounded-full animate-pulse" th:if="${recruit.member == null}"></span>
                            <span th:classappend="${recruit.member != null} ? 'text-slate-500' : 'text-accent font-black'"
                                  class="text-[0.65rem] uppercase tracking-widest"
                                  th:text="${recruit.member != null ? 'CLOSED' : 'OPEN'}">모집 중</span>
                        </div>
                    </div>
                </div>
            </div>


            <!-- 5. 지원하기 버튼 -->
            <button class="w-full bg-accent text-white py-4 rounded-custom text-lg font-black hover:bg-accent-hover hover:-translate-y-0.5 shadow-lg transition-all active:translate-y-0" 
                    onclick="openModal()">지원하기</button>
        </article>

        <!-- 6. 댓글 섹션 -->
        <section class="bg-white border border-border rounded-custom p-8 shadow-custom">
            <h2 class="text-lg font-black text-primary mb-8 tracking-tight">댓글 [[${#lists.size(postDetail.comments)}]]</h2>

            <!-- 댓글 작성 (로그인 시) -->
            <form sec:authorize="isAuthenticated()" th:action="@{/posts/{id}/comment/write(id=${postDetail.id})}" method="post" class="flex gap-3 mb-12">
                <input type="text" name="content" placeholder="댓글을 입력하세요" required
                       class="flex-1 px-5 py-3.5 border-[1.5px] border-border rounded-custom text-[1rem] outline-none bg-white focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                <button type="submit" class="bg-primary text-white px-8 py-3.5 rounded-custom font-bold hover:bg-accent transition-all">게시</button>
            </form>

            <!-- 댓글 리스트 -->
            <div class="space-y-8">
                <div th:each="comment : ${postDetail.comments}" class="group pb-8 border-b border-slate-50 last:border-none">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <strong class="text-primary font-black" th:text="${comment.author.name}">유저명</strong>
                            <span class="text-[0.8rem] text-slate-400 font-bold" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                        </div>
                        <!-- 댓글 삭제 버튼 -->
                        <form th:if="${user != null and comment.author.id == user.id}" th:action="@{/comments/{id}/delete(id=${comment.id})}" method="post">
                            <input type="hidden" name="cls" value="Comment">
                            <input type="hidden" name="postId" th:value="${postDetail.id}">
                            <input type="hidden" name="commentId" th:value="${comment.id}">
                            <input type="hidden" name="returnUri" th:value="${currentUri}">
                            <button type="submit" class="text-slate-300 hover:text-accent font-bold text-xs transition-colors">삭제</button>
                        </form>
                    </div>
                    <p class="text-primary leading-relaxed text-[1rem]" th:text="${comment.content}">댓글 내용</p>
                </div>
                <div th:if="${#lists.isEmpty(postDetail.comments)}" class="py-10 text-center text-slate-300 font-bold">
                    아직 댓글이 없습니다. 첫 의견을 남겨보세요!
                </div>
            </div>
        </section>
    </main>

    <!-- 지원 모달 -->
    <div id="applyModal" class="fixed inset-0 z-[2000] hidden bg-black/60 backdrop-blur-sm overflow-y-auto">
        <div class="flex min-h-screen items-center justify-center p-4 py-12">
            <div class="bg-white w-full max-w-[520px] p-12 rounded-custom shadow-2xl relative animate-modal-slide">
                <span class="absolute top-6 right-6 text-3xl text-slate-400 cursor-pointer hover:text-accent transition-transform hover:rotate-90" onclick="closeModal()">&times;</span>
                <h2 class="text-2xl font-black text-primary mb-10 text-center tracking-tight">지원 폼</h2>
                
                <form id="application-form" th:action="@{/recruits/apply}" method="post" class="space-y-5 text-left"
                      th:with="allRecruits=${postDetail.recruits},
                               availableRecruits=${allRecruits.?[member == null]}">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[0.9rem] font-bold text-primary mb-2">나이</label>
                            <input type="number" name="age" required
                                   class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all font-medium">
                        </div>
                        <div>
                            <label class="block text-[0.9rem] font-bold text-primary mb-2">지역</label>
                            <input type="text" name="location" required
                                   class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all font-medium">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[0.9rem] font-bold text-primary mb-2">지원 파트</label>
                        <!-- [Empty State] 모집 파트가 있을 때 -->
                        <select th:if="${!#lists.isEmpty(availableRecruits)}" name="recruitId" required
                                class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all bg-white font-medium">
                            <option th:each="recruit : ${availableRecruits}" th:value="${recruit.id}" th:text="${recruit.position}">파트명</option>
                        </select>
                        <!-- [Empty State] 모든 파트 마감 시 -->
                        <div th:if="${#lists.isEmpty(availableRecruits)}" 
                             class="w-full px-5 py-3 border-[1.5px] border-dashed border-accent bg-accent/5 rounded-custom text-accent font-black text-center text-sm">
                            🚫 모든 파트 모집이 마감되었습니다.
                        </div>
                    </div>
                    <div>
                        <label class="block text-[0.9rem] font-bold text-primary mb-2">전화번호</label>
                        <input type="tel" name="phone" placeholder="010-0000-0000" required
                               class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all font-medium">
                    </div>
                    <div>
                        <label class="block text-[0.9rem] font-bold text-primary mb-2">자기소개</label>
                        <textarea name="description" rows="4" placeholder="본인의 장점이나 활동 경력을 간단히 입력하세요" required
                                  class="w-full px-5 py-3 border-[1.5px] border-border rounded-custom outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all resize-none font-medium"></textarea>
                    </div>
                    <input type="hidden" name="returnUri" th:value="${currentUri}">
                    
                    <!-- 제출 버튼 -->
                    <th:block th:with="availableRecruits=${postDetail.recruits.?[member == null]}">
                        <button th:if="${!#lists.isEmpty(availableRecruits)}" type="submit" 
                                class="w-full bg-accent text-white py-4 mt-4 rounded-custom text-lg font-black hover:bg-accent-hover hover:-translate-y-1 shadow-lg transition-all active:translate-y-0">제출하기</button>
                        <button th:if="${#lists.isEmpty(availableRecruits)}" type="button" disabled
                                class="w-full bg-slate-200 text-slate-400 py-4 mt-4 rounded-custom text-lg font-black cursor-not-allowed">모든 파트 모집 마감</button>
                    </th:block>
                </form>
            </div>
        </div>
    </div>

    <style>
        @keyframes modal-slide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-modal-slide { animation: modal-slide 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:inline="javascript">
        function openModal() {
            const isAuthenticated = [[${user != null}]];
            if (isAuthenticated) {
                const modal = document.getElementById('applyModal');
                modal.classList.remove('hidden');
                modal.classList.add('block');
            } else {
                alert("로그인 후 이용해주세요.");
                location.href = [[@{/login}]];
            }
        }
        function closeModal() {
            const modal = document.getElementById('applyModal');
            modal.classList.remove('block');
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
