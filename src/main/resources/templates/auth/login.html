<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BandConnect</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/styles-auth.css}">
</head>
<body>
<header th:replace="~{fragments/navBar :: navBar}"></header>
<main>
    <section class="login-section">
        <form class="form" method="post" th:action="@{/login}" id="loginForm">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" required>

            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" id="loginButton" class="btn btn-primary">로그인</button>

            <button type="button" id="testLoginButton" class="btn" onclick="quickLogin()"
                    style="margin-top: 10px; background-color: #64748b; color: white; border: none;">
                테스트 계정으로 로그인 (Quick Login)
            </button>
            <p class="error" th:if="${param.error}" style="color: red">
                아이디 또는 비밀번호가 틀렸습니다.
            </p>

            <p class="sign-up-text">
                회원이 아니신가요?
                <a th:href="@{/signup}">회원가입 하기</a>
            </p>
        </form>
    </section>
</main>

<script>
    function quickLogin() {
        document.getElementById('username').value = 'test';
        document.getElementById('password').value = 'test1231';

        document.getElementById('loginForm').submit();
    }
</script>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
