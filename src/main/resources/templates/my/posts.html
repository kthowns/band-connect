<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect - 구인 관리</title>
</head>
<body class="bg-bg-main">
<header th:replace="~{fragments/navBar :: navBar}"></header>

<main class="max-w-[900px] mx-auto my-16 px-6">
    <section>
        <h2 class="text-[1.75rem] font-black text-primary mb-12 border-l-8 border-accent pl-6 tracking-tighter">구인 폼
            관리</h2>

        <div th:if="${posts.isEmpty()}"
             class="bg-white p-24 rounded-custom text-center border-2 border-dashed border-border text-slate-400">
            <!-- [Empty State] -->
            <p class="text-xl mb-8">작성한 구인 게시글이 없습니다.</p>
            <a th:href="@{/posts/write}"
               class="bg-accent text-white px-8 py-4 rounded-custom font-black hover:bg-accent-hover transition-all inline-block shadow-lg">첫
                구인글 작성하기</a>
        </div>

        <div th:unless="${posts.isEmpty()}" class="space-y-10">
            <!-- 게시글 리스트 -->
            <article th:each="post : ${posts}" class="bg-white border border-border rounded-custom p-10 shadow-custom">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h3 class="text-[1.5rem] font-black text-primary hover:text-accent transition-colors cursor-pointer tracking-tight mb-2"
                            th:onclick="|location.href='@{/posts/{id}(id=${post.id})}'|"
                            th:text="${post.title}">구인글 제목</h3>
                        <p class="text-accent font-extrabold flex items-center gap-2">
                            <span class="text-slate-300 text-sm">BAND</span> [[${post.bandName}]]
                        </p>
                    </div>
                    <span class="text-[0.85rem] text-slate-400 font-bold"
                          th:text="|작성일: ${#temporals.format(post.createdAt, 'yyyy-MM-dd')}|"></span>
                </div>

                <div class="pt-8 border-t border-slate-50">
                    <p class="text-[1rem] font-black text-primary mb-6 flex items-center gap-2">📢 파트별 모집 현황</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div th:each="recruit : ${post.recruits}"
                             class="bg-slate-50/50 border border-border rounded-custom p-6">
                            <div class="flex justify-between items-center mb-5 pb-3 border-b border-white">
                                <span class="font-black text-primary text-lg" th:text="${recruit.position}">보컬</span>
                                <span th:with="isClosed=${recruit.member != null}"
                                      th:classappend="${isClosed ? 'bg-slate-800 text-white' : 'bg-accent text-white'}"
                                      th:text="${isClosed ? '마감' : '모집 중'}"
                                      class="text-[0.75rem] font-black px-2.5 py-1 rounded-sm uppercase">상태</span>
                            </div>

                            <ul class="space-y-3">
                                <li th:each="app : ${recruit.applications}">
                                    <div th:with="statusName=${app.status.name()}, isClosed=${recruit.member != null}"
                                         th:classappend="${statusName == 'ACCEPTED'} ? 'bg-primary text-white border-primary' : 
                                                        (${statusName == 'REJECTED'} ? 'bg-slate-100 text-slate-400 border-border opacity-60' : 
                                                        (${isClosed} ? 'bg-slate-50 text-slate-300 border-border' : 'bg-white text-primary border-border hover:border-accent hover:text-accent hover:-translate-y-0.5'))"
                                         class="flex items-center justify-between px-4 py-3 border rounded-custom font-bold text-[0.95rem] transition-all cursor-pointer shadow-sm"
                                         th:onclick="showApplicantDetails([[${app.id}]], [[${app.applicant.id}]], [[${app.applicant.username}]], [[${app.age}]], [[${app.location}]], [[${app.phone}]], [[${app.description}]], [[${app.status.description}]], [[${statusName}]])">
                                        <span>👤 [[${app.applicant.username}]]</span>
                                        <span th:if="${statusName == 'ACCEPTED'}" class="text-sm">✔️</span>
                                        <span th:if="${statusName == 'REJECTED'}" class="text-sm">❌</span>
                                    </div>
                                </li>
                                <li th:if="${#lists.isEmpty(recruit.applications)}"
                                    class="text-center py-4 text-[0.85rem] text-slate-300 font-bold border-2 border-dashed border-white rounded-custom">
                                    아직 지원자가 없습니다.
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>

<!-- 지원자 상세 모달 -->
<div id="applicant-modal"
     class="fixed inset-0 z-[2000] hidden bg-black/60 backdrop-blur-md overflow-y-auto font-sans">
    <div class="flex min-h-screen items-center justify-center p-4 py-12">
        <div class="bg-white w-full max-w-[500px] p-12 rounded-custom shadow-2xl relative animate-modal-slide">
            <button class="absolute top-6 right-6 text-3xl text-slate-400 hover:text-accent transition-transform hover:rotate-90"
                    onclick="closeModal()">×
            </button>
            <h3 class="text-2xl font-black text-primary mb-8 text-center tracking-tight">지원자 상세 정보</h3>

            <div class="flex justify-center mb-8">
                <p>지원 상태 : <span id="applicant-status"
                                 class="px-4 py-1.5 rounded-sm font-black text-[0.8rem] uppercase"></span></p>
            </div>

            <div class="space-y-4 mb-10 text-left">
                <p class="flex justify-between items-center py-2.5 border-b border-slate-50"><strong
                        class="text-slate-400 text-sm">이름</strong> <span id="applicant-name"
                                                                         class="font-black text-primary"></span></p>
                <p class="flex justify-between items-center py-2.5 border-b border-slate-50"><strong
                        class="text-slate-400 text-sm">나이</strong> <span id="applicant-age"
                                                                         class="font-black text-primary"></span></p>
                <p class="flex justify-between items-center py-2.5 border-b border-slate-50"><strong
                        class="text-slate-400 text-sm">지역</strong> <span id="applicant-location"
                                                                         class="font-black text-primary"></span></p>
                <p class="flex justify-between items-center py-2.5 border-b border-slate-50"><strong
                        class="text-slate-400 text-sm">연락처</strong> <span id="applicant-phone"
                                                                          class="font-black text-primary"></span></p>
                <div class="mt-6 bg-slate-50 p-6 rounded-custom border border-border">
                    <strong class="block text-accent text-sm font-black mb-3 text-left">자기소개</strong>
                    <p id="applicant-description" class="text-primary leading-relaxed text-[0.95rem] text-left"></p>
                </div>
            </div>

            <div id="modal-actions" class="flex gap-4">
                <form id="confirm-form" method="post" th:action="@{/applications/confirm}" class="w-full flex gap-4">
                    <input type="hidden" name="applicationId" id="modal-applicationId">
                    <input type="hidden" name="isAccepted" id="modal-isAccepted">
                    <input type="hidden" name="returnUri" th:value="${currentUri}">
                    <button type="button"
                            class="flex-1 bg-primary text-white py-4 rounded-custom font-black hover:bg-primary-dark transition-all"
                            onclick="handleConfirm('ACCEPTED')">수락
                    </button>
                    <button type="button"
                            class="flex-1 bg-accent text-white py-4 rounded-custom font-black hover:bg-accent-hover transition-all"
                            onclick="handleConfirm('REJECTED')">거절
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes modal-slide {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-modal-slide {
        animation: modal-slide 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:inline="javascript">
    function showApplicantDetails(applicationId, applicantId, name, age, location, phone, description, statusDesc, statusName) {
        document.getElementById('applicant-name').textContent = name;
        document.getElementById('applicant-age').textContent = age;
        document.getElementById('applicant-location').textContent = location;
        document.getElementById('applicant-phone').textContent = phone;
        document.getElementById('applicant-description').textContent = description;

        const statusBadge = document.getElementById('applicant-status');
        statusBadge.textContent = statusDesc;

        // 상태별 뱃지 스타일
        statusBadge.className = 'px-4 py-1.5 rounded-sm font-black text-[0.8rem] uppercase ';
        if (statusName === 'ACCEPTED') statusBadge.classList.add('bg-primary', 'text-white');
        else if (statusName === 'REJECTED') statusBadge.classList.add('bg-slate-200', 'text-slate-500');
        else statusBadge.classList.add('bg-accent', 'text-white');

        const actionButtons = document.getElementById('modal-actions');
        actionButtons.classList.toggle('hidden', statusName !== 'APPLIED');

        const modal = document.getElementById('applicant-modal');
        modal.classList.remove('hidden');
        modal.classList.add('block');
        document.getElementById('modal-applicationId').value = applicationId;
    }

    function handleConfirm(isAccepted) {
        document.getElementById('modal-isAccepted').value = isAccepted;
        document.getElementById('confirm-form').submit();
    }

    function closeModal() {
        const modal = document.getElementById('applicant-modal');
        modal.classList.remove('block');
        modal.classList.add('hidden');
    }
</script>
</body>
</html>
