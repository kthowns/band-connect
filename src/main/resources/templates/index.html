<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect</title>
</head>
<body class="bg-bg-main">
    <header th:replace="~{fragments/navBar :: navBar}"></header>

    <main class="max-w-[850px] mx-auto my-16 px-6">
        <!-- 검색 섹션 -->
        <section class="text-center mb-16">
            <h2 class="text-[2rem] font-black text-primary mb-10 tracking-tighter">🎸 우리 밴드에 꼭 맞는 멤버 찾기</h2>
            <div class="max-w-[650px] mx-auto">
                <form th:action="@{/}" method="get" class="flex bg-white p-2 rounded-custom shadow-custom border-[1.5px] border-border focus-within:border-accent focus-within:ring-4 focus-within:ring-accent/10 transition-all duration-300">
                    <input type="text" name="keyword" th:value="${param.keyword}" placeholder="장르나 악기를 입력하세요 (예: #밴드 #기타)" 
                           class="flex-1 border-none px-6 py-3 text-lg outline-none bg-transparent text-primary placeholder-slate-400" required>
                    <button type="submit" class="bg-primary text-white border-none px-8 py-3 rounded-custom font-bold hover:bg-accent hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300">검색</button>
                </form>
            </div>
        </section>

        <!-- 게시글 리스트 -->
        <section class="flex flex-col gap-8">
            <div class="flex justify-between items-end border-b-2 border-primary pb-4 mb-4">
                <h3 class="text-2xl font-black text-primary tracking-tight">최신 구인 소식</h3>
                <button sec:authorize="isAuthenticated()"
                        class="bg-accent text-white px-6 py-2.5 rounded-custom font-bold hover:bg-accent-hover hover:-translate-y-0.5 shadow-lg transition-all"
                        th:onclick="|location.href='@{/posts/write}'|">글 작성
                </button>
            </div>

            <!-- [Empty State] -->
            <div th:if="${#lists.isEmpty(posts)}" class="bg-white p-24 rounded-custom text-center border-2 border-dashed border-border text-slate-400">
                <p class="text-xl">등록된 구인글이 없습니다. 첫 소식을 올려보세요!</p>
            </div>

            <!-- 게시글 카드 -->
            <div th:unless="${#lists.isEmpty(posts)}" th:each="post : ${posts}"
                 class="group bg-white border border-border rounded-custom p-8 shadow-custom hover:shadow-custom-hover hover:border-accent hover:-translate-y-1 transition-all duration-300 cursor-pointer"
                 th:onclick="|location.href='@{/posts/{id}(id=${post.id})}'|">

                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-[1.4rem] font-black text-primary group-hover:text-accent transition-colors tracking-tight" th:text="${post.title}">제목</h3>
                    <div class="flex gap-2 items-center">
                        <span th:each="tag : ${post.hashtags}" class="text-accent font-bold text-[0.85rem] bg-accent/5 px-2.5 py-1 rounded" th:text="|#${tag.name}|"></span>
                    </div>
                </div>

                <div class="space-y-3 mb-8 text-[1.05rem]">
                    <p class="flex items-center gap-3"><strong class="text-slate-400 font-bold min-w-[80px]">밴드명</strong> <span class="text-primary font-bold" th:text="${post.band?.name ?: '이름 없음'}"></span></p>
                    <p class="flex items-start gap-3">
                        <strong class="text-slate-400 font-bold min-w-[80px]">모집 파트</strong>
                        <span class="flex flex-wrap gap-2">
                            <th:block th:each="recruit : ${post.recruits}" th:if="${recruit.member == null}">
                                <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-[4px] text-[0.85rem] font-bold border border-border" th:text="${recruit.position}">기타</span>
                            </th:block>
                            <span class="bg-slate-800 text-white px-3 py-1 rounded-[4px] text-[0.85rem] font-bold" th:if="${post.closed}">모집 마감</span>
                        </span>
                    </p>
                </div>

                <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                    <div class="flex gap-4 text-[0.9rem] font-bold">
                        <span class="text-accent">💬 댓글 [[${#lists.size(post.comments)}]]</span>
                        <span class="text-slate-400">👀 조회수 [[${post.views}]]</span>
                    </div>
                    <span class="text-[0.85rem] text-slate-400" th:if="${post.createdAt != null}"
                          th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
            </div>
        </section>

        <!-- 페이지네이션 -->
        <nav th:if="${!posts.isEmpty()}" class="mt-20 flex justify-center">
            <ul class="flex gap-2.5">
                <li th:classappend="${posts.first} ? 'opacity-30 pointer-events-none'">
                    <a th:href="@{/(page=${posts.number - 1}, keyword=${keyword})}"
                       class="flex items-center justify-center h-[2.75rem] px-5 rounded-custom font-bold border-[1.5px] border-border bg-white text-primary hover:border-accent hover:text-accent transition-all">이전</a>
                </li>

                <th:block th:with="start=${(posts.number / 10) * 10 + 1}, total=${posts.totalPages}, last=${(start + 9 < total ? start + 9 : (total == 0 ? 1 : total))}">
                    <li th:each="page : ${#numbers.sequence(start, last)}">
                        <a th:href="@{/(page=${page - 1}, keyword=${keyword})}"
                           th:text="${page}"
                           th:classappend="${page == posts.number + 1} ? 'bg-accent text-white border-accent' : 'bg-white text-primary border-border hover:border-accent hover:text-accent'"
                           class="flex items-center justify-center min-w-[2.75rem] h-[2.75rem] px-2 rounded-custom font-bold border-[1.5px] transition-all duration-300">1</a>
                    </li>
                </th:block>

                <li th:classappend="${posts.last} ? 'opacity-30 pointer-events-none'">
                    <a th:href="@{/(page=${posts.number + 1}, keyword=${keyword})}"
                       class="flex items-center justify-center h-[2.75rem] px-5 rounded-custom font-bold border-[1.5px] border-border bg-white text-primary hover:border-accent hover:text-accent transition-all">다음</a>
                </li>
            </ul>
        </nav>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
