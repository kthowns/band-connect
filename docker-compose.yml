version: '3.8'
services:
  band-db:
    container_name: band-db
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - band-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - band-net

  band-app:
    container_name: band-app
    image: ${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest
    env_file:
      - .env
    restart: always
    networks:
      - band-net
    depends_on:
      band-db:
        condition: service_healthy

networks:
  band-net:
    external: true

volumes:
  band-db-data: