<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect - Profile</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/styles-applications.css}">
</head>
<body>
<header th:replace="~{fragments/navBar :: navBar}"></header>

<main>
    <section class="my-posts-section">
        <h2 class="section-title">지원 폼 관리</h2>

        <!-- 지원 내역이 없을 때 -->
        <div class="no-posts" th:if="${#lists.isEmpty(applications)}">
            <p>아직 지원한 내역이 없습니다.</p>
            <a th:href="@{/}" class="action-link-btn">밴드 구인글 보러가기</a>
        </div>

        <!-- 지원 내역 리스트 -->
        <ul class="post-list" th:if="${!#lists.isEmpty(applications)}">
            <li th:each="apl : ${applications}"
                class="post-card"
                th:classappend="${apl.status.name() == 'ACCEPTED' ? 'approved' :
                                 (apl.status.name() == 'REJECTED' ? 'rejected' : 'pending')}">

                <a th:href="@{/posts/{id}(id=${apl.recruit.post.id})}">
                    <h3 th:text="${apl.recruit.post.title}">구인글 제목</h3>
                </a>
                <p><strong>밴드:</strong> <span th:text="${apl.recruit.post.band.name}">밴드 이름</span></p>
                <p><strong>지원 파트:</strong> <span th:text="${apl.recruit.position}">포지션</span></p>

                <!-- Enum의 description 활용 -->
                <p><strong>상태: </strong><span class="status-text" th:text="${apl.status.description}">대기중</span></p>

                <p><span class="date"
                         th:text="|지원 일시: ${#temporals.format(apl.createdAt, 'yyyy-MM-dd HH:mm')}|">
                    지원 일시: 2026-03-23 10:00
                </span></p>
            </li>
        </ul>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
