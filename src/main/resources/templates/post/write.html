<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect - 게시글 작성</title>
</head>
<body class="bg-bg-main">
    <header th:replace="~{fragments/navBar :: navBar}"></header>

    <main class="max-w-[650px] mx-auto my-16 px-6">
        <section class="bg-white border border-border rounded-custom p-12 shadow-custom-hover transition-all duration-300">
            <h1 class="text-[2rem] font-black text-primary mb-12 text-center tracking-tighter">게시글 작성</h1>

            <form method="POST" th:action="@{/posts/write}" id="postForm" class="space-y-8">
                <!-- 1. 제목 입력 -->
                <div>
                    <label for="title" class="block text-[0.95rem] font-bold text-primary mb-3">제목</label>
                    <div class="flex items-center gap-3 px-5 py-1 border-[1.5px] border-border rounded-custom focus-within:border-accent focus-within:ring-4 focus-within:ring-accent/10 transition-all">
                        <span class="text-xl">📝</span>
                        <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required
                               class="w-full py-3.5 text-[1rem] outline-none bg-transparent text-primary placeholder-slate-300 font-medium">
                    </div>
                </div>

                <!-- 2. 밴드 선택 -->
                <div>
                    <label for="bandId" class="block text-[0.95rem] font-bold text-primary mb-3">밴드 선택</label>
                    <div class="px-5 py-1 border-[1.5px] border-border rounded-custom focus-within:border-accent focus-within:ring-4 focus-within:ring-accent/10 transition-all bg-white">
                        <select id="bandId" name="bandId" required
                                class="w-full py-3.5 text-[1rem] outline-none bg-transparent text-primary font-medium appearance-none">
                            <option value="">-- 게시글을 올릴 밴드를 선택하세요 --</option>
                            <option th:each="band : ${bands}" th:value="${band.id}" th:text="${band.name}">밴드 이름</option>
                        </select>
                    </div>
                    <!-- 가입된 밴드가 없을 경우 -->
                    <div th:if="${#lists.isEmpty(bands)}" class="mt-3 text-[0.9rem] text-accent font-bold">
                        <p>관리 중인 밴드가 없습니다. <a th:href="@{/bands/create}" class="underline ml-1">밴드 만들기</a></p>
                    </div>
                </div>

                <!-- 3. 내용 입력 -->
                <div>
                    <label for="content" class="block text-[0.95rem] font-bold text-primary mb-3">내용</label>
                    <div class="border-[1.5px] border-border rounded-custom focus-within:border-accent focus-within:ring-4 focus-within:ring-accent/10 transition-all">
                        <textarea id="content" name="content" placeholder="내용을 입력하세요" required
                                  class="w-full p-5 min-h-[250px] text-[1rem] outline-none bg-transparent text-primary placeholder-slate-300 font-medium resize-none leading-relaxed"></textarea>
                    </div>
                </div>

                <!-- 4. 해시태그 -->
                <div>
                    <label for="hashtag" class="block text-[0.95rem] font-bold text-primary mb-3">태그</label>
                    <div class="px-5 py-1 border-[1.5px] border-border rounded-custom focus-within:border-accent focus-within:ring-4 focus-within:ring-accent/10 transition-all">
                        <input type="text" id="hashtag" name="hashtag" placeholder="#태그 (예: #락 #홍대 #기타구함)"
                               class="w-full py-3.5 text-[1rem] outline-none bg-transparent text-primary placeholder-slate-300 font-medium">
                    </div>
                </div>

                <!-- 5. 구인 파트 (동적 추가) -->
                <div>
                    <label class="block text-[0.95rem] font-bold text-primary mb-3">구인 파트</label>
                    <div id="part-list" class="space-y-3">
                        <div class="part-box">
                            <input type="text" name="parts[]" placeholder="구인 파트 항목 (예: 퍼스트 기타)" required
                                   class="w-full px-5 py-3.5 border-[1.5px] border-border rounded-custom text-[0.95rem] font-medium outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
                        </div>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button type="button" onclick="addPart()" 
                                class="bg-white text-primary border-2 border-primary px-4 py-2 rounded-custom font-black hover:bg-primary hover:text-white transition-all text-xl">+</button>
                        <button type="button" onclick="removePart()" 
                                class="bg-white text-primary border-2 border-primary px-4 py-2 rounded-custom font-black hover:bg-primary hover:text-white transition-all text-xl">-</button>
                    </div>
                </div>

                <!-- 6. 제출 버튼 -->
                <div class="pt-8 border-t border-slate-50">
                    <button type="submit" id="submit-btn" disabled
                            class="w-full bg-accent text-white py-5 rounded-custom text-xl font-black opacity-50 cursor-not-allowed shadow-lg transition-all">
                        게시글 등록
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const bandSelect = document.getElementById('bandId');
            const submitBtn = document.getElementById('submit-btn');

            bandSelect.addEventListener('change', function() {
                if (this.value !== "") {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    submitBtn.classList.add('hover:bg-accent-hover', 'hover:-translate-y-1', 'cursor-pointer');
                } else {
                    submitBtn.disabled = true;
                    submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    submitBtn.classList.remove('hover:bg-accent-hover', 'hover:-translate-y-1', 'cursor-pointer');
                }
            });
        });

        function addPart() {
            const partList = document.getElementById('part-list');
            const newPartBox = document.createElement('div');
            newPartBox.className = 'part-box animate-in fade-in slide-in-from-top-2 duration-300';
            newPartBox.innerHTML = `
                <input type="text" name="parts[]" placeholder="구인 파트 항목" required
                       class="w-full px-5 py-3.5 border-[1.5px] border-border rounded-custom text-[0.95rem] font-medium outline-none focus:border-accent focus:ring-4 focus:ring-accent/10 transition-all">
            `;
            partList.appendChild(newPartBox);
        }

        function removePart() {
            const partList = document.getElementById('part-list');
            const partBoxes = partList.getElementsByClassName('part-box');
            if (partBoxes.length > 1) {
                partList.removeChild(partBoxes[partBoxes.length - 1]);
            } else {
                alert('최소 하나의 구인 파트는 입력해야 합니다.');
            }
        }
    </script>
</body>
</html>
