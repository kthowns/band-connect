<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect - 지원 현황</title>
</head>
<body class="bg-bg-main">
<header th:replace="~{fragments/navBar :: navBar}"></header>

<main class="max-w-[800px] mx-auto my-16 px-6">
    <section>
        <h2 class="text-[1.75rem] font-black text-primary mb-12 border-l-8 border-accent pl-6 tracking-tighter">지원 폼 관리</h2>

        <!-- 지원 내역이 없을 때 -->
        <div th:if="${#lists.isEmpty(applications)}" class="bg-white p-24 rounded-custom text-center border-2 border-dashed border-border text-slate-400">
            <p class="text-xl mb-8">아직 지원한 내역이 없습니다.</p>
            <a th:href="@{/}" class="bg-accent text-white px-8 py-4 rounded-custom font-black hover:bg-accent-hover transition-all inline-block shadow-lg">밴드 구인글 보러가기</a>
        </div>

        <!-- 지원 내역 리스트 -->
        <div th:if="${!#lists.isEmpty(applications)}" class="space-y-6">
            <article th:each="apl : ${applications}"
                     th:with="status=${apl.status.name()}"
                     th:classappend="${status == 'ACCEPTED'} ? 'border-l-primary bg-white' : 
                                    (${status == 'REJECTED'} ? 'border-l-slate-200 bg-slate-50 opacity-70' : 'border-l-accent bg-white')"
                     class="group border-l-[6px] border border-border rounded-custom p-8 shadow-custom hover:shadow-custom-hover hover:-translate-x-1 transition-all duration-300">
                
                <a th:href="@{/posts/{id}(id=${apl.recruit.post.id})}" class="block mb-6">
                    <h3 class="text-[1.4rem] font-black text-primary group-hover:text-accent transition-colors tracking-tight" th:text="${apl.recruit.post.title}">구인글 제목</h3>
                </a>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-[1.05rem] mb-6">
                    <p class="flex items-center gap-3"><strong class="text-slate-400 font-bold min-w-[80px]">밴드</strong> <span class="text-primary font-bold" th:text="${apl.recruit.post.band.name}"></span></p>
                    <p class="flex items-center gap-3"><strong class="text-slate-400 font-bold min-w-[80px]">지원 파트</strong> <span class="text-accent font-black" th:text="${apl.recruit.position}"></span></p>
                </div>

                <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                    <div class="flex items-center gap-3">
                        <strong class="text-slate-400 text-sm font-bold">상태</strong>
                        <span th:classappend="${status == 'ACCEPTED'} ? 'bg-primary' : (${status == 'REJECTED'} ? 'bg-slate-400' : 'bg-accent')"
                              class="text-white text-[0.75rem] font-black px-3 py-1 rounded-sm uppercase tracking-wider shadow-sm"
                              th:text="${apl.status.description}">대기중</span>
                    </div>
                    <span class="text-[0.85rem] text-slate-400 font-bold" th:text="|지원 일시: ${#temporals.format(apl.createdAt, 'yyyy-MM-dd HH:mm')}|"></span>
                </div>
            </article>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
