<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandConnect - 밴드 생성</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/styles-post-write.css}">
</head>
<body>
<header th:replace="~{fragments/navBar :: navBar}"></header>

<main class="post-write-container">
    <section class="card">
        <h1 class="card-title">🎸 새로운 밴드 만들기</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">
            밴드를 생성하면 구인 게시글을 올릴 수 있습니다.
        </p>

        <form method="POST" th:action="@{/bands/create}">
            <!-- 밴드 이름 -->
            <div class="card-field">
                <label for="name">밴드 이름</label>
                <div class="input-box">
                    <span class="icon">🤘</span>
                    <input type="text" id="name" name="name"
                           placeholder="멋진 밴드 이름을 지어주세요" required>
                </div>
            </div>

            <!-- 밴드 설명 -->
            <div class="card-field">
                <label for="description">밴드 소개</label>
                <div class="textarea-box">
                    <textarea id="description" name="description"
                              placeholder="우리 밴드는 어떤 음악을 하나요? (장르, 활동 지역 등)"
                              style="height: 150px;"></textarea>
                </div>
            </div>

            <!-- 제출 버튼 -->
            <div class="submit-section" style="margin-top: 30px;">
                <button type="submit" class="submit-btn">밴드 생성하기</button>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
