spring:
  application:
    name: bandconnect
  profiles:
    active: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        highlight_sql: true
        use_sql_comments: true
        format_sql: true
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}

server:
  port: 8080
  servlet:
    session:
      timeout: 30m # 세션 만료 기한 30분
      
logging:
  level.org:
    hibernate:
      type:
        descriptor:
          sql:
            BasicBinder: trace