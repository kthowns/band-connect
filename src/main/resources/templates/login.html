<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BandConnect</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="header">
    <div class="logo">🎵 BandConnect</div>
    <nav>
        <div class="nav-links">
            <a th:href="@{/}">홈</a>
            <a th:href="@{/login}">로그인/회원가입</a>
        </div>
    </nav>
</header>

<form class="form" method="post" th:action="@{/login}">
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" required>

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" id="loginButton">로그인</button>
    <p class="error" th:if="${param.error}" style="color: red">
        아이디 또는 비밀번호가 틀렸습니다.
    </p>
    <!-- Sign-up 텍스트 -->
    <p class="sign-up-text">
        회원이 아니신가요?
        <a th:href="@{/signup}">회원가입 하기</a>
    </p>
</form>

<footer class="footer">
    <p>© 2026 BandConnect. All Rights Reserved.</p>
</footer>
</body>
</html>
